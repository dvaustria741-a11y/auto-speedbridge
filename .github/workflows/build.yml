name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Unzip project if present
        run: |
          if [ -f auto-speedbridge-project.zip ]; then
            unzip -o auto-speedbridge-project.zip -d _extracted
            cp -r _extracted/sb2/. .
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: auto-speedbridge
          path: build/libs/*.jar
