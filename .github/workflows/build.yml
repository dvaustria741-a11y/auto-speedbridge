name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: List repo contents
        run: ls -la

      - name: Unzip project if present
        run: |
          ZIP=$(find . -maxdepth 1 -iname "*.zip" | head -n 1)
          if [ -n "$ZIP" ]; then
            echo "Found zip: $ZIP"
            unzip -o "$ZIP" -d _extracted
            find _extracted -maxdepth 3
            SRC_DIR=$(find _extracted -maxdepth 2 -iname "build.gradle" -printf '%h\n' | head -n 1)
            echo "Project dir: $SRC_DIR"
            cp -r "$SRC_DIR"/. .
          fi
          ls -la

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build --stacktrace

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: auto-speedbridge
          path: build/libs/*.jar
